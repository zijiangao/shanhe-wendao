[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter="res://ASSET_PROVENANCE.md,res://THIRD_PARTY_NOTICES.md"
exclude_filter="res://tests/*,res://BUILDING.md,res://STEAM_RELEASE.md,res://STORE_PAGE_DRAFT.md,res://assets/art/battle-tokens-chroma.png,res://assets/art/ui-source/*"
export_path="../build/windows/ShanheWendao.exe"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=0
binary_format/embed_pck=false
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
codesign/enable=false
application/modify_resources=true
application/icon="res://assets/icon/app_icon.ico"
application/console_wrapper_icon="res://assets/icon/app_icon.ico"
application/icon_interpolation=4
application/file_version="0.80.0.0"
application/product_version="0.80.0.0"
application/company_name="Zijian Gao"
application/product_name="山河问道"
application/file_description="武侠门派养成与回合制角色扮演游戏"
application/copyright="Copyright © 2026 Zijian Gao"
application/trademarks=""
ssh_remote_deploy/enabled=false
ssh_remote_deploy/host="user@host_ip"
ssh_remote_deploy/port="22"
ssh_remote_deploy/extra_args_ssh=""
ssh_remote_deploy/extra_args_scp=""
ssh_remote_deploy/run_script="#!/usr/bin/env bash\nexport DISPLAY=:0\nunzip -o -q \"{temp_dir}/{archive_name}\" -d \"{temp_dir}\"\n\"{temp_dir}/{exe_name}\" {cmd_args}"
ssh_remote_deploy/cleanup_script="#!/usr/bin/env bash\nkill $(pgrep -x -f \"{temp_dir}/{exe_name} {cmd_args}\")\nrm -rf \"{temp_dir}\""

